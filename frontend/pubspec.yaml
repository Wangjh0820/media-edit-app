name: media_edit_app
description: A professional media editing application with AI features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  
  http: ^1.1.0
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  camera: ^0.10.5+7
  image_picker: ^1.0.4
  image_cropper: ^5.0.0
  photo_manager: ^2.7.0
  
  video_player: ^2.8.1
  video_editor: ^3.0.0
  image_editor: ^1.3.0
  
  flutter_image_compress: ^2.1.0
  cached_network_image: ^3.3.0
  
  permission_handler: ^11.1.0
  
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  shimmer: ^3.0.0
  lottie: ^2.7.0
  
  google_fonts: ^6.1.0
  
  flutter_colorpicker: ^1.0.3
  slider_button: ^2.0.0
  
  path_provider: ^2.1.1
  path: ^1.8.3
  
  uuid: ^4.2.1
  
  intl: ^0.18.1
  
  flutter_slidable: ^3.0.1
  
  photo_view: ^0.14.0
  
  ffmpeg_kit_flutter: ^6.0.3
  
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    
  fonts:
    - family: AppIcons
      fonts:
        - asset: assets/fonts/AppIcons.ttf
