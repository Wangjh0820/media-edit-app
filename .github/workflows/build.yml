name: Build iOS and Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: |
          cd frontend
          flutter pub get
        
      - name: Build APK
        run: |
          cd frontend
          flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: |
          cd frontend
          flutter pub get
        
      - name: Build iOS (No Codesign)
        run: |
          cd frontend
          flutter build ios --release --no-codesign
        
      - name: Create iOS Archive
        run: |
          cd frontend/build/ios/iphoneos
          zip -r ../../../Runner.app.zip Runner.app
        
      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: frontend/Runner.app.zip
